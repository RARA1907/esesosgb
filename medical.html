<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İSGM Hekim Modülü - Sağlık Kayıtları</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0fdf4; padding: 30px; display: none; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 800px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #166534; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #374151; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { background: #16a34a; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #15803d; }
        .nav-link { display: block; text-align: center; margin-top: 15px; color: #64748b; text-decoration: none; font-size: 14px; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }

        .table-container { margin-top: 35px; border-top: 2px solid #bbf7d0; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f0fdf4; color: #166534; font-weight: 600; }
        .badge-decision { background: #dbeafe; color: #1e40af; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 Periyodik Muayene & Sağlık Kartı Girişi</h2>
    <p style="color: #64748b; font-size: 14px;">Klinik bulguları girip ilgili firmayla ilişkilendirin.</p>
    
    <div class="form-group">
        <label>İlgili Müşteri Firma</label>
        <select id="company_select">
            <option value="">Firmalar yükleniyor...</option>
        </select>
    </div>

    <div class="form-group">
        <label>Göz Muayene Bulguları (Ek-2)</label>
        <input type="text" id="goz" placeholder="Örn: Sol 0.8, Sağ 1.0 Tam">
    </div>

    <div class="form-group">
        <label>Kardiyovasküler (Kalp/Tansiyon) Bulguları</label>
        <input type="text" id="kalp" placeholder="Örn: TA: 120/80 mmHg">
    </div>

    <div class="form-group">
        <label>Kas-İskelet Sistemi Bulguları</label>
        <input type="text" id="kas" placeholder="Örn: Hareket kısıtlılığı yok">
    </div>

    <div class="form-group">
        <label>Kanaat ve Sonucu Kararı</label>
        <select id="decision">
            <option value="Ağır ve Tehlikeli İşlerde Çalışabilir">Ağır ve Tehlikeli İşlerde Çalışabilir</option>
            <option value="Yüksekte Çalışabilir">Yüksekte Çalışabilir</option>
            <option value="Kısıtlamalarla Çalışabilir">Kısıtlamalarla Çalışabilir</option>
            <option value="Sahada Çalışması Uygun Değildir">Sahada Çalışması Uygun Değildir</option>
        </select>
    </div>

    <button onclick="saveMedical()">Sağlık Kartını Onayla ve Kaydet (Canlı)</button>
    <div id="status"></div>

    <div class="table-container">
        <h3>📋 Geçmiş Periyodik Muayene Kartları (Canlı)</h3>
        <table>
            <thead>
                <tr>
                    <th>Firma Unvanı</th>
                    <th>Göz Bulgusu</th>
                    <th>Kalp/Tansiyon</th>
                    <th>Hekim Kararı</th>
                </tr>
            </thead>
            <tbody id="medical_table_body">
                <tr>
                    <td colspan="4" style="text-align:center; color:#94a3b8;">Veriler yükleniyor...</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <a href="index.html" class="nav-link">← Ana Yönetim Paneline Dön</a>
</div>

<script>
    const SUPABASE_URL = "https://dnvuizausfcjzkcsynql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LtrytF9wyS3u-KgSZk7heg_SZc7hhoY";
    const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = async function() {
        const { data: { session } } = await dbClient.auth.getSession();
        if (!session) { window.location.href = "login.html"; return; }
        
        const email = session.user.email;
        if (!email.includes('hekim') && !email.includes('admin')) {
            alert("⚠️ Bu sayfaya erişim yetkiniz yoktur!");
            window.location.href = "index.html";
        } else {
            document.body.style.display = "block";
            await fetchCompaniesToSelect(); // Önce firmaları yükle
            fetchMedicalRecords(); // Sonra listele
        }
    };

    async function fetchCompaniesToSelect() {
        const select = document.getElementById('company_select');
        try {
            const { data } = await dbClient.from('customer_companies').select('id, company_name').order('company_name');
            if (data && data.length > 0) {
                select.innerHTML = '<option value="">-- Lütfen Firma Seçin --</option>';
                data.forEach(c => { select.innerHTML += `<option value="${c.id}">${c.company_name}</option>`; });
            } else { select.innerHTML = '<option value="">Sistemde kayıtlı firma yok!</option>'; }
        } catch (err) { console.error(err.message); }
    }

    async function fetchMedicalRecords() {
        const tbody = document.getElementById('medical_table_body');
        try {
            const { data } = await dbClient
                .from('worker_medical_records')
                .select('*, customer_companies(company_name)')
                .order('created_at', { ascending: false });

            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8;">Kayıtlı muayene kartı bulunmuyor.</td></tr>`;
                return;
            }
            tbody.innerHTML = '';
            data.forEach(m => {
                const compName = m.customer_companies ? m.customer_companies.company_name : 'Bilinmeyen Firma';
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${compName}</strong></td>
                        <td>${m.goz_secure || '-'}</td>
                        <td>${m.kalp_secure || '-'}</td>
                        <td><span class="badge-decision">${m.final_decision}</span></td>
                    </tr>
                `;
            });
        } catch (err) { tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">Hata: ${err.message}</td></tr>`; }
    }

    async function saveMedical() {
        const compId = document.getElementById('company_select').value;
        const gozVal = document.getElementById('goz').value;
        const kalpVal = document.getElementById('kalp').value;
        const kasVal = document.getElementById('kas').value;
        const decisionVal = document.getElementById('decision').value;
        const statusDiv = document.getElementById('status');

        if(!compId || !gozVal || !kalpVal || !kasVal) { statusDiv.style.color = "red"; statusDiv.innerText = "Lütfen firma dahil tüm alanları doldurun!"; return; }
        statusDiv.style.color = "blue"; statusDiv.innerText = "Medikal kayıt gönderiliyor...";

        const { error } = await dbClient.from('worker_medical_records').insert([{ 
            company_id: compId,
            goz_secure: gozVal, 
            kalp_secure: kalpVal, 
            kas_secure: kasVal, 
            final_decision: decisionVal 
        }]);

        if (error) { statusDiv.style.color = "red"; statusDiv.innerText = "Hata: " + error.message; }
        else {
            statusDiv.style.color = "green"; statusDiv.innerText = "🚀 Muayene Kartı İlgili Firmaya Bağlanarak Kaydedildi!";
            document.getElementById('goz').value = ''; document.getElementById('kalp').value = ''; document.getElementById('kas').value = '';
            fetchMedicalRecords();
        }
    }
</script>
</body>
</html>
