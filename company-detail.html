<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSGB SaaS - Firma Detay Raporu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; padding: 30px; display: none; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 1000px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .back-btn { background: #64748b; color: white; border: none; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .back-btn:hover { background: #475569; }
        
        /* Firma Künyesi Tasarımı */
        .company-profile { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin-top: 20px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .profile-item { font-size: 14px; }
        .profile-label { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 11px; }
        .profile-value { color: #1e293b; font-weight: bold; font-size: 15px; margin-top: 4px; }

        /* İki Kolonlu Panel Düzeni */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .panel { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; }
        .panel-title-uzman { color: #0284c7; border-bottom: 2px solid #0284c7; padding-bottom: 8px; margin-top: 0; }
        .panel-title-hekim { color: #16a34a; border-bottom: 2px solid #16a34a; padding-bottom: 8px; margin-top: 0; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #475569; font-weight: 600; }
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .status-closed { background-color: #f0fdf4; opacity: 0.7; }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="back-btn">← Ana Panele Geri Dön</a>
        <span style="font-size: 13px; color: #94a3b8; font-weight: bold;">FİRMA 360° ÖZET RAPORU</span>
    </div>

    <!-- 🏢 FİRMA KÜNYESİ -->
    <div class="company-profile">
        <div class="profile-item">
            <div class="profile-label">Firma Ticari Unvanı</div>
            <div class="profile-value" id="lbl_company_name">Yükleniyor...</div>
        </div>
        <div class="profile-item">
            <div class="profile-label">Vergi Numarası</div>
            <div class="profile-value" id="lbl_tax_number">-</div>
        </div>
        <div class="profile-item">
            <div class="profile-label">NACE Kodu</div>
            <div class="profile-value" id="lbl_nace_code">-</div>
        </div>
        <div class="profile-item">
            <div class="profile-label">Tehlike Sınıfı</div>
            <div class="profile-value" id="lbl_danger_class">-</div>
        </div>
    </div>

    <!-- 📊 İKİ KOLONLU DETAY MATRİSİ -->
    <div class="detail-grid">
        
        <!-- SOL PANEL: FİRMAYA AİT RİSK ANALİZLERİ -->
        <div class="panel">
            <h3 class="panel-title-uzman">🦺 Uzman Risk Bulguları</h3>
            <table>
                <thead>
                    <tr>
                        <th>Tehlike Tanımı</th>
                        <th>Skor</th>
                        <th>Termin</th>
                        <th>Durum</th>
                    </tr>
                </thead>
                <tbody id="company_risk_tbody">
                    <tr><td colspan="4" style="text-align:center; color:#94a3b8;">Veriler süzülüyor...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- SAĞ PANEL: FİRMAYA AİT SAĞLIK MUAYENE KARTLARI -->
        <div class="panel">
            <h3 class="panel-title-hekim">🩺 Hekim Sağlık Kartları</h3>
            <table>
                <thead>
                    <tr>
                        <th>Çalışan (Yaş/Cins)</th>
                        <th>Bulgular</th>
                        <th>Hekim Kararı</th>
                    </tr>
                </thead>
                <tbody id="company_medical_tbody">
                    <tr><td colspan="3" style="text-align:center; color:#94a3b8;">Veriler süzülüyor...</td></tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script>
    const SUPABASE_URL = "https://dnvuizausfcjzkcsynql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LtrytF9wyS3u-KgSZk7heg_SZc7hhoY";
    const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = async function() {
        // Güvenlik Kontrolü
        const { data: { session } } = await dbClient.auth.getSession();
        if (!session) { window.location.href = "login.html"; return; }
        document.body.style.display = "block";

        // URL'den hangi firmanın tıklandığını (ID parametresini) yakalıyoruz
        const urlParams = new URLSearchParams(window.location.search);
        const companyId = urlParams.get('id');

        if (!companyId) {
            alert("Hatalı istek! Firma seçilmedi.");
            window.location.href = "index.html";
            return;
        }

        // 3 Büyük Canlı Süzgeci Çalıştır
        await fetchCompanyProfile(companyId);
        fetchCompanyRisks(companyId);
        fetchCompanyMedical(companyId);
    };

    // 1. FİRMA KÜNYESİNİ ÇEKEN FONKSİYON
    async function fetchCompanyProfile(id) {
        try {
            const { data, error } = await dbClient.from('customer_companies').select('*').eq('id', id).single();
            if (error) throw error;
            if (data) {
                document.getElementById('lbl_company_name').innerText = data.company_name;
                document.getElementById('lbl_tax_number').innerText = data.tax_number || '-';
                document.getElementById('lbl_nace_code').innerText = data.nace_code || '-';
                document.getElementById('lbl_danger_class').innerText = data.danger_class;
            }
        } catch (err) { console.error(err.message); }
    }

    // 2. SADECE O FİRMANIN RİSKLERİNİ SÜZEN FONKSİYON
    async function fetchCompanyRisks(id) {
        const tbody = document.getElementById('company_risk_tbody');
        try {
            const { data } = await dbClient.from('risk_assessments').select('*').eq('company_id', id).order('created_at', { ascending: false });
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8;">Bu firmaya ait kayıtlı risk yok.</td></tr>`;
                return;
            }
            tbody.innerHTML = '';
            data.forEach(r => {
                const isClosed = r.status === 'Kapalı';
                const rowClass = isClosed ? 'status-closed' : '';
                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td>${isClosed ? `<s>${r.hazard_title}</s>` : r.hazard_title}</td>
                        <td><strong>${r.risk_score}</strong></td>
                        <td>${r.target_date}</td>
                        <td><span class="badge" style="background:${isClosed ? '#dcfce7' : '#fee2e2'}; color:${isClosed ? '#15803d' : '#b91c1c'};">${r.status}</span></td>
                    </tr>
                `;
            });
        } catch (err) { tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">Hata: ${err.message}</td></tr>`; }
    }

    // 3. SADECE O FİRMANIN SAĞLIK KAYITLARINI SÜZEN FONKSİYON
    async function fetchCompanyMedical(id) {
        const tbody = document.getElementById('company_medical_tbody');
        try {
            const { data } = await dbClient.from('worker_medical_records').select('*').eq('company_id', id).order('created_at', { ascending: false });
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#94a3b8;">Bu firmaya ait sağlık kaydı yok.</td></tr>`;
                return;
            }
            tbody.innerHTML = '';
            data.forEach(m => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${m.worker_name || 'İsimsiz'}</strong><br><small>${m.worker_age} Yaş / ${m.worker_gender}</small></td>
                        <td>👁️ ${m.goz_secure || '-'} <br> ❤️ ${m.kalp_secure || '-'}</td>
                        <td><span class="badge-decision" style="font-size:11px; font-weight:bold; color:#1e40af;">${m.final_decision}</span></td>
                    </tr>
                `;
            });
        } catch (err) { tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:red;">Hata: ${err.message}</td></tr>`; }
    }
</script>
</body>
</html>
