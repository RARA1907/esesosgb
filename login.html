<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSGB SaaS - Giriş Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 35px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #1e293b; margin-top: 0; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #475569; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        button { background: #2563eb; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🏢 <span id="tenant_title">OSGB SaaS</span> Giriş</h2>
    <div id="tenant_hint" style="text-align:center; color:#64748b; font-size:13px; margin-top:-15px; margin-bottom:20px;">Sistem giriş paneli</div>
    
    <div class="form-group">
        <label>E-Posta Adresi</label>
        <input type="email" id="email" placeholder="uzman@osgb.com veya hekim@osgb.com">
    </div>

    <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="password" placeholder="••••••">
    </div>

    <button onclick="handleLogin()">Sisteme Giriş Yap</button>
    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = "https://dnvuizausfcjzkcsynql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LtrytF9wyS3u-KgSZk7heg_SZc7hhoY";
    const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


    async function loadTenantBrand() {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('tenant') || localStorage.getItem('tenant_slug') || 'eses';
        localStorage.setItem('tenant_slug', slug);
        try {
            const { data, error } = await dbClient.from('tenants').select('name, slug, logo_url, primary_color, is_active').eq('slug', slug).maybeSingle();
            if (!error && data) {
                document.getElementById('tenant_title').innerText = data.name || 'OSGB SaaS';
                document.getElementById('tenant_hint').innerText = 'Giriş adresi: ' + window.location.origin + '/login.html?tenant=' + data.slug;
                if (data.primary_color) {
                    document.querySelector('button').style.background = data.primary_color;
                }
            }
        } catch (err) {
            console.warn('Tenant bilgisi okunamadı:', err.message);
        }
    }

    window.onload = loadTenantBrand;

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('message');

        if(!email || !password) {
            msg.style.color = "red";
            msg.innerText = "Lütfen tüm alanları doldurun!";
            return;
        }

        msg.style.color = "blue";
        msg.innerText = "Kimlik doğrulanıyor...";

        // Supabase Auth servisine giriş isteği atıyoruz
        const { data, error } = await dbClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            msg.style.color = "red";
            msg.innerText = "Giriş Başarısız: " + error.message;
        } else {
            msg.style.color = "green";
            msg.innerText = "Giriş Başarılı! Yönlendiriliyorsunuz...";
            
            // Giriş token'ını tarayıcı hafızasında tutup ana panele atıyoruz
            setTimeout(() => {
                const slug = localStorage.getItem('tenant_slug') || 'eses';
                window.location.href = 'dashboard.html?tenant=' + encodeURIComponent(slug);
            }, 1000);
        }
    }
</script>
</body>
</html>
